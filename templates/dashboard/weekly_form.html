{% extends "dashboard/base.html" %}
{% block page_title %}{{ section_title }}{% endblock %}
{% block content %}
<form method="post" class="dash-form-card" style="max-width: 32rem;">
    {% csrf_token %}
    {% for field in form %}
        <div class="form-row">
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {{ field.errors }}
        </div>
    {% endfor %}
    <div class="dash-actions" style="margin-top:0;">
        <button type="submit" class="dash-btn dash-btn--primary">Save</button>
        <a href="{% url 'dashboard:weekly_list' %}" class="dash-btn dash-btn--secondary">Back</a>
    </div>
</form>
{% endblock %}
